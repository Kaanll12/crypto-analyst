<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Şifre Sıfırla — CryptoAnalyst</title>
  <meta name="robots" content="noindex"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .reset-card {
      width: 100%; max-width: 420px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--r-2xl); padding: 40px 36px;
    }
    .reset-logo { text-align: center; margin-bottom: 28px; }
    .reset-logo svg { width: 32px; height: 32px; color: var(--accent); }
    .reset-logo h1 { font-size: 20px; font-weight: 700; margin-top: 10px; }
    .reset-logo p { color: var(--fg-muted); font-size: 14px; margin-top: 6px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 12px; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: var(--r-md);
      color: var(--fg); font-family: var(--font); font-size: 14px;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 11px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--r-md); font-weight: 600; font-size: 14px;
      cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .pass-hint { font-size: 11px; color: var(--fg-subtle); margin-top: 4px; }
    .back-link { display: block; text-align: center; margin-top: 18px; color: var(--fg-muted); font-size: 13px; text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .msg-box { padding: 12px 16px; border-radius: var(--r-md); margin-bottom: 16px; font-size: 14px; display: none; }
    .msg-box.success { background: var(--bullish-dim); border: 1px solid var(--bullish-border); color: var(--bullish); }
    .msg-box.error   { background: var(--bearish-dim); border: 1px solid var(--bearish-border); color: var(--bearish); }
    #invalidMsg { text-align: center; padding: 20px 0; color: var(--fg-muted); font-size: 14px; }
  </style>
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<div class="reset-card">
  <div class="reset-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <h1>Şifre Sıfırla</h1>
    <p>Yeni şifrenizi belirleyin.</p>
  </div>

  <div id="invalidMsg" style="display:none">
    ⛔ Bu link geçersiz veya süresi dolmuş.<br>
    <a href="/" style="color:var(--accent)">Ana sayfaya dön →</a>
  </div>

  <div id="resetForm">
    <div class="msg-box" id="msgBox"></div>

    <div class="form-group">
      <label class="form-label">Yeni Şifre</label>
      <input class="form-input" type="password" id="newPass" placeholder="••••••••" autocomplete="new-password"/>
      <div class="pass-hint">En az 8 karakter, 1 büyük harf, 1 rakam</div>
    </div>
    <div class="form-group">
      <label class="form-label">Yeni Şifre (Tekrar)</label>
      <input class="form-input" type="password" id="confirmPass" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <button class="btn-primary" onclick="resetPassword()" id="resetBtn">Şifreyi Sıfırla</button>
  </div>

  <a class="back-link" href="/">← Ana sayfaya dön</a>
</div>

<script src="js/api.js"></script>
<script>
(function() {
  // Token URL'den al
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token || token.length !== 64) {
    document.getElementById('resetForm').style.display   = 'none';
    document.getElementById('invalidMsg').style.display  = '';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.textContent  = text;
    el.className    = 'msg-box ' + type;
    el.style.display = '';
  }

  window.resetPassword = async function() {
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    if (!newPass || !confirm) { showMsg('Tüm alanları doldurun.', 'error'); return; }
    if (newPass !== confirm)  { showMsg('Şifreler eşleşmiyor.', 'error'); return; }
    if (newPass.length < 8 || !/[A-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
      showMsg('Şifre: en az 8 karakter, 1 büyük harf, 1 rakam.', 'error'); return;
    }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Sıfırlanıyor…';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: newPass }),
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Hata oluştu.', 'error');
        btn.disabled = false; btn.textContent = 'Şifreyi Sıfırla';
        return;
      }
      showMsg('✅ ' + (data.message || 'Şifre sıfırlandı!'), 'success');
      document.getElementById('newPass').value    = '';
      document.getElementById('confirmPass').value = '';
      btn.style.display = 'none';
      setTimeout(() => { window.location.href = '/'; }, 2500);
    } catch {
      showMsg('Bağlantı hatası.', 'error');
      btn.disabled = false; btn.textContent = 'Şifreyi Sıfırla';
    }
  };
})();
</script>
</body>
</html>
